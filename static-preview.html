<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shopify Supply Static Preview</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #111;
      color: #fff;
    }

    .notice {
      padding: 12px 16px;
      background: #1b1b1b;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 14px;
      line-height: 1.4;
    }

    .notice strong {
      display: inline-block;
      margin-right: 8px;
    }

    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 50px);
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="notice">
    <strong>Static preview</strong>
    This view disables Shopify's live app scripts so the downloaded page can render offline.
  </div>
  <iframe
    title="Shopify Supply static preview"
    src="/index.html"
    sandbox="allow-same-origin allow-forms allow-popups"
    referrerpolicy="no-referrer"
  ></iframe>
</body>
</html>
